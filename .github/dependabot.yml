version: 2
updates:
  # NuGet dependencies (versions are centrally pinned in Directory.Packages.props).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nuget-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        update-types:
          - minor
          - patch
