name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# A new push to a ref cancels the previous, still-running run for that ref, so runs don't pile up
# and compete for scarce runners (notably Intel macOS).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-latest      # Apple Silicon — exercises the same Security.framework P/Invoke as Intel
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Unit tests (net8.0 + net10.0)
        run: dotnet test --project tests/Latchkey.Tests/Latchkey.Tests.csproj -c Release

      # --- Integration tests against the real OS store, per platform ---

      - name: Integration tests (Linux)
        if: runner.os == 'Linux'
        run: |
          # Retry: the ARM package mirror (ports.ubuntu.com) is intermittently unreachable.
          for attempt in 1 2 3 4 5; do
            sudo apt-get update && sudo apt-get install -y gnome-keyring libsecret-1-0 dbus-x11 && break
            echo "apt attempt ${attempt} failed; retrying in 15s..."; sleep 15
          done
          # A NON-empty password is required: an empty one makes gnome-keyring try to prompt
          # (confirming unencrypted storage), which fails with no display, so the default
          # "login" collection is never created and every store fails.
          dbus-run-session -- bash -c '
            echo -n "latchkey-ci" | gnome-keyring-daemon --daemonize --unlock --components=secrets
            dotnet test --project tests/Latchkey.IntegrationTests/Latchkey.IntegrationTests.csproj -c Release'

      - name: Integration tests (macOS)
        if: runner.os == 'macOS'
        run: |
          security create-keychain -p "" latchkey-test.keychain
          security unlock-keychain -p "" latchkey-test.keychain
          security list-keychains -d user -s latchkey-test.keychain
          security default-keychain -s latchkey-test.keychain  # SecItemAdd targets the default keychain; lookups search the list — they must be the same one
          set +e
          dotnet test --project tests/Latchkey.IntegrationTests/Latchkey.IntegrationTests.csproj -c Release
          code=$?
          security delete-keychain latchkey-test.keychain
          exit $code

      - name: Integration tests (Windows)
        if: runner.os == 'Windows'
        run: dotnet test --project tests/Latchkey.IntegrationTests/Latchkey.IntegrationTests.csproj -c Release

  # Build the sample apps (so they can't bit-rot) and smoke-run the Tour end to end. The Tour uses an
  # explicit File backend, so it runs on a bare runner with no OS keyring.
  samples:
    name: Samples build + smoke run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build samples
        run: |
          dotnet build samples/Latchkey.QuickStart/Latchkey.QuickStart.csproj -c Release
          dotnet build samples/Latchkey.Tour/Latchkey.Tour.csproj -c Release

      - name: Smoke-run the Tour (File backend, headless-safe)
        run: dotnet run --project samples/Latchkey.Tour -c Release --no-build

  # The failure path is a feature: on Linux with no Secret Service, detection must throw a clear,
  # actionable exception rather than silently falling back to an insecure file.
  headless-linux:
    name: Linux without a keyring (asserts unavailable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Assert LatchkeyBackendUnavailableException with no Secret Service
        env:
          LATCHKEY_EXPECT_UNAVAILABLE: '1'
        run: dotnet test --project tests/Latchkey.IntegrationTests/Latchkey.IntegrationTests.csproj -c Release

  # The pass backend needs a real `pass` store, which needs a GPG key — neither exists on a stock
  # runner. Set up a throwaway, passphrase-less key, initialise the default store, then run just the
  # pass suite (with coverage, folded into the gate below). `pass ls` is a preflight gate (fail loudly
  # if setup broke rather than skip the tests) and --minimum-expected-tests guards against a filter
  # that silently matches nothing. Runs on both Linux architectures.
  pass-linux:
    name: pass backend (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, rid: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64 }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install pass and initialise a throwaway store
        run: |
          # Retry: apt mirrors (notably the ARM ports mirror) are intermittently unreachable.
          for attempt in 1 2 3 4 5; do
            sudo apt-get update && sudo apt-get install -y pass && break
            echo "apt attempt ${attempt} failed; retrying in 15s..."; sleep 15
          done
          # A passphrase-less key (empty --passphrase under --batch, loopback pinentry) so pass can
          # encrypt and decrypt with no prompt. The default algorithm includes an encryption subkey,
          # which is what pass requires; a locally generated key is ultimately trusted, so gpg
          # encrypts to it without an interactive confirmation.
          gpg --batch --pinentry-mode loopback --passphrase '' \
            --quick-generate-key 'Latchkey CI <ci@latchkey.test>'
          pass init ci@latchkey.test
          pass ls  # preflight: fails the job if the store is not usable

      - name: Pass integration tests (with coverage)
        run: |
          dotnet run --project tests/Latchkey.IntegrationTests/Latchkey.IntegrationTests.csproj -c Release -f net10.0 -- \
            --treenode-filter "/*/*/PassIntegrationTests/*" --minimum-expected-tests 2 \
            --coverage --coverage-output-format cobertura --coverage-output pass-${{ matrix.rid }}.cobertura.xml

      - name: Gather coverage
        run: |
          mkdir -p coverage
          find tests -path '*TestResults*' -name 'pass-*.cobertura.xml' -exec cp {} coverage/ \;
          ls -la coverage

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-pass-${{ matrix.rid }}
          path: coverage/*.cobertura.xml

  # systemd-creds host-key sealing needs root to read/create /var/lib/systemd/credential.secret
  # (GitHub runners have no usable TPM), so this leg runs the suite under sudo. The preflight
  # seal/unseal round-trip gates the job: if the environment can't seal, fail loudly instead of
  # letting the test skip, and --minimum-expected-tests guards the filter matching nothing. Coverage
  # (root-owned) is gathered back to the runner user and folded into the gate below.
  systemd-creds-linux:
    name: systemd-creds backend (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, rid: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64 }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Preflight — host-key seal/unseal as root
        run: |
          systemd-creds --version
          printf 'preflight' | sudo systemd-creds encrypt --name=latchkey-preflight - - \
            | sudo systemd-creds decrypt --name=latchkey-preflight - - | grep -q preflight

      - name: systemd-creds integration tests (with coverage)
        run: |
          sudo -E env "PATH=$PATH" \
            dotnet run --project tests/Latchkey.IntegrationTests/Latchkey.IntegrationTests.csproj -c Release -f net10.0 -- \
              --treenode-filter "/*/*/SystemdCredsIntegrationTests/*" --minimum-expected-tests 2 \
              --coverage --coverage-output-format cobertura --coverage-output sdcreds-${{ matrix.rid }}.cobertura.xml

      - name: Gather coverage
        run: |
          mkdir -p coverage
          # The coverage file was written by the root test process; copy it out and hand it back.
          sudo find tests -path '*TestResults*' -name 'sdcreds-*.cobertura.xml' -exec cp {} coverage/ \;
          sudo chown -R "$(id -u):$(id -g)" coverage
          ls -la coverage

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-sdcreds-${{ matrix.rid }}
          path: coverage/*.cobertura.xml

  # Collect coverage natively on each OS (each covers that platform's backend), then merge + gate.
  coverage:
    name: Coverage (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, rid: linux-x64 }
          - { os: macos-latest, rid: osx-arm64 }
          - { os: windows-latest, rid: win-x64 }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Unit + DI coverage
        run: |
          dotnet run --project tests/Latchkey.Tests/Latchkey.Tests.csproj -c Release -f net10.0 -- \
            --coverage --coverage-output-format cobertura --coverage-output unit.cobertura.xml
          dotnet run --project tests/Latchkey.Extensions.DependencyInjection.Tests/Latchkey.Extensions.DependencyInjection.Tests.csproj -c Release -f net10.0 -- \
            --coverage --coverage-output-format cobertura --coverage-output di.cobertura.xml

      - name: Integration coverage (Linux)
        if: runner.os == 'Linux'
        run: |
          # Retry: the ARM package mirror (ports.ubuntu.com) is intermittently unreachable.
          for attempt in 1 2 3 4 5; do
            sudo apt-get update && sudo apt-get install -y gnome-keyring libsecret-1-0 dbus-x11 && break
            echo "apt attempt ${attempt} failed; retrying in 15s..."; sleep 15
          done
          dbus-run-session -- bash -c '
            echo -n "latchkey-ci" | gnome-keyring-daemon --daemonize --unlock --components=secrets
            dotnet run --project tests/Latchkey.IntegrationTests/Latchkey.IntegrationTests.csproj -c Release -f net10.0 -- \
              --coverage --coverage-output-format cobertura --coverage-output integ.cobertura.xml'

      - name: Integration coverage (macOS)
        if: runner.os == 'macOS'
        run: |
          security create-keychain -p "" latchkey-test.keychain
          security unlock-keychain -p "" latchkey-test.keychain
          security list-keychains -d user -s latchkey-test.keychain
          security default-keychain -s latchkey-test.keychain  # SecItemAdd targets the default keychain; lookups search the list — they must be the same one
          set +e
          dotnet run --project tests/Latchkey.IntegrationTests/Latchkey.IntegrationTests.csproj -c Release -f net10.0 -- \
            --coverage --coverage-output-format cobertura --coverage-output integ.cobertura.xml
          code=$?
          security delete-keychain latchkey-test.keychain
          exit $code

      - name: Integration coverage (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet run --project tests/Latchkey.IntegrationTests/Latchkey.IntegrationTests.csproj -c Release -f net10.0 -- \
            --coverage --coverage-output-format cobertura --coverage-output integ.cobertura.xml

      - name: Gather cobertura files
        run: |
          mkdir -p coverage
          n=0
          for f in $(find tests -path '*TestResults*' -name '*.cobertura.xml'); do
            cp "$f" "coverage/cov-${{ matrix.rid }}-$n.cobertura.xml"
            n=$((n + 1))
          done
          ls -la coverage

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.rid }}
          path: coverage/*.cobertura.xml

  coverage-report:
    name: Coverage report + gate
    needs: [ coverage, pass-linux, systemd-creds-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the coverage comment on PRs
    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: actions/download-artifact@v8
        with:
          path: coverage
          pattern: coverage-*
          merge-multiple: true

      - name: Merge and report
        id: coverage
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            "-reports:coverage/*.cobertura.xml" \
            "-targetdir:coveragereport" \
            "-reporttypes:TextSummary;MarkdownSummaryGithub" \
            "-assemblyfilters:+Latchkey*"
          cat coveragereport/Summary.txt
          cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          pct=$(grep -oiE 'Line coverage: [0-9.]+%' coveragereport/Summary.txt | head -1 | grep -oE '[0-9.]+')
          echo "pct=${pct:-0}" >> "$GITHUB_OUTPUT"

      # Post (and keep updating) a single coverage comment on same-repo PRs. Fork PRs get a read-only
      # token, so skip them rather than fail. Runs before the gate so coverage shows even when it fails.
      - name: Comment coverage on the PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage
          path: coveragereport/SummaryGithub.md

      - name: Enforce coverage threshold
        run: |
          pct=${{ steps.coverage.outputs.pct }}
          # Merged across all three OSes is ~94%. The uncovered remainder is native "throw if the OS
          # call unexpectedly fails" defensive branches, which can't be exercised without fault
          # injection into the P/Invoke layer — a compromise this thin-interop library avoids.
          threshold=90
          echo "Merged line coverage: ${pct}% (threshold ${threshold}%)"
          if awk "BEGIN{ exit !(${pct:-0} >= ${threshold}) }"; then
            echo "Coverage meets the threshold."
          else
            echo "::error::Line coverage ${pct}% is below the ${threshold}% threshold."
            exit 1
          fi

  # Single required status check for branch protection: green only when every job above succeeded.
  ci-success:
    name: CI success
    if: always()
    needs: [ test, samples, headless-linux, pass-linux, systemd-creds-linux, coverage, coverage-report ]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any needed job did not succeed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more CI jobs failed or were cancelled."
          exit 1
      - run: echo "All CI jobs passed."
