name: Release

# Cut a release by pushing a semver tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# The tag name (minus the leading `v`) becomes the package version.
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # OIDC token for NuGet Trusted Publishing
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so Source Link embeds the real commit

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: dotnet restore

      - run: dotnet build --no-restore -c Release -p:Version=${{ steps.version.outputs.VERSION }}

      # Fast sanity gate. Integration tests need a real OS store (covered by CI on the tagged commit),
      # so the release run only re-checks the platform-agnostic unit + DI suites.
      - name: Unit + DI tests
        run: |
          dotnet test --project tests/Latchkey.Tests/Latchkey.Tests.csproj \
            --no-build -c Release -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet test --project tests/Latchkey.Extensions.DependencyInjection.Tests/Latchkey.Extensions.DependencyInjection.Tests.csproj \
            --no-build -c Release -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack
        run: dotnet pack Latchkey.slnx --no-build -c Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts

      # NuGet Trusted Publishing: exchange the GitHub OIDC token for a short-lived API key — no
      # long-lived secret. Requires a trusted-publishing policy on nuget.org for EACH package
      # (Latchkey and Latchkey.Extensions.DependencyInjection): owner kerem-acer, repo latchkey,
      # workflow release.yml, plus a NUGET_USER secret holding your nuget.org username.
      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" ./artifacts/*.nupkg ./artifacts/*.snupkg --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
