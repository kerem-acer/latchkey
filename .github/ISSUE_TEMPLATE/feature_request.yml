name: Feature request
description: Suggest an improvement or new capability.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Latchkey aims to stay small and honest — a tiny API over the OS-native credential store.
        Proposals that keep the core zero-dependency and AOT/trim-clean are the easiest to accept.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Latchkey makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing backends, a CustomBackend, or workarounds you've tried.
    validations:
      required: false
